<!DOCTYPE html>
<html>
<head>
    <title>AR Wall Prototype: 360 Flow with Fade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        #overlay, #confirmOverlay { 
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-family: sans-serif;
        }

        #confirmOverlay { display: none; z-index: 10000; }

        .modal-box {
            background: #333;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #FFD700;
            text-align: center;
        }

        button { 
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            background: #FFD700;
            margin: 10px;
            cursor: pointer;
        }

        #noBtn { background: #555; color: white; }

        /* Exit 360 button */
        #exit360 {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 10001;
            display: none;
        }

        /* Fade overlay */
        #fadeOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: black;
            z-index: 10002;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        html, body { margin: 0; height: 100%; overflow: hidden; }
    </style>
</head>

<body>

<div id="overlay">
    <button id="startButton">Start AR Experience</button>
    <div>Point at the poster and move closer to trigger activity.</div>
</div>

<div id="confirmOverlay">
    <div class="modal-box">
        <h2>Keystone Lake: Bull Creek Boat Ramp</h2>
        <p>Would you like to go to the page?</p>
        <button id="yesBtn">Open Page</button>
        <button id="noBtn">Not Now</button>
    </div>
</div>

<button id="exit360">Exit 360</button>
<div id="fadeOverlay"></div>

<a-scene
    ar-ready-signal
    ar-paused-signal
    mindar-image="imageTargetSrc: target_with_sub.mind; filterMinCF: 0.0001; filterBeta: 0.001;"
    vr-mode-ui="enabled: false;"
    device-orientation-permission-ui="enabled: false;"
    renderer="colorManagement: false; logarithmicDepthBuffer: true;">

    <a-assets>
        <img id="markerImage" src="assets/marker.png">
        <img id="panorama" src="assets/panorama.jpg">
    </a-assets>

    <!-- 360 SKY -->
    <a-sky id="sky360" src="#panorama" visible="false"></a-sky>

    <!-- CAMERA -->
    <a-camera id="camera" look-controls="enabled: true; touchEnabled: true; magicWindowTrackingEnabled: true"></a-camera>

    <!-- MAIN TARGET -->
    <a-entity mindar-image-target="targetIndex: 0">
        <a-image 
            src="#markerImage"
            position="0.3 0.2 0.03"
            width="0.15" height="0.15"
            animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; dur: 1000; loop: true">
        </a-image>
    </a-entity>

    <!-- SUB TARGET -->
    <a-entity id="subTarget" mindar-image-target="targetIndex: 1"></a-entity>

</a-scene>

<script>
AFRAME.registerComponent('ar-ready-signal', {
  init: function () {
    this.hasSignaled = false;
  },
  tick: function () {
    const mindar = this.el.systems['mindar-image-system'];
    if (!this.hasSignaled && mindar && mindar.isRunning()) {
      this.el.emit('arReady');
      this.hasSignaled = true;
    }
  }
});

AFRAME.registerComponent('ar-paused-signal', {
  init: function () {
    this.hasSignaled = false;
  },
  tick: function () {
    const mindar = this.el.systems['mindar-image-system'];
    if (!this.hasSignaled && mindar && !mindar.isRunning()) {
      this.el.emit('arPaused');
      this.hasSignaled = true;
    }
  }
});
</script>
    
<script>
let hasTriggered = false;
const websiteURL = "https://www.recreation.gov/activitypass/AP22376";

const startButton = document.querySelector('#startButton');
const overlay = document.querySelector('#overlay');
const confirmOverlay = document.querySelector('#confirmOverlay');
const yesBtn = document.querySelector('#yesBtn');
const noBtn = document.querySelector('#noBtn');
const exit360 = document.querySelector('#exit360');
const fadeOverlay = document.querySelector('#fadeOverlay');

const subTarget = document.querySelector('#subTarget');
const sky = document.querySelector('#sky360');
const sceneEl = document.querySelector('a-scene');

/* Fade helpers */
function fadeIn(duration = 500) {
    fadeOverlay.style.transition = `opacity ${duration}ms`;
    fadeOverlay.style.opacity = '1';
}
function fadeOut(duration = 500) {
    fadeOverlay.style.transition = `opacity ${duration}ms`;
    fadeOverlay.style.opacity = '0';
}

/* START BUTTON */
startButton.addEventListener('click', () => {
    overlay.style.display = 'none';
    setTimeout(() => window.dispatchEvent(new Event('resize')), 100);
});

/* ENTER 360 MODE */
subTarget.addEventListener('targetFound', async () => {
    if (hasTriggered) return;
    hasTriggered = true;

    console.log("Entering 360 mode");

    fadeIn(500);
    await new Promise(res => setTimeout(res, 500));

    // Reset pause signal
    sceneEl.components['ar-paused-signal'].hasSignaled = false;

    // Pause AR
    const mindarSystem = sceneEl.systems['mindar-image-system'];
    mindarSystem.pause();

    // Wait until AR is actually paused
    sceneEl.addEventListener('arPaused', () => {
        console.log("AR paused, switching to 360");

        // Hide AR content
        document.querySelectorAll('[mindar-image-target]').forEach(el => el.object3D.visible = false);

        const mindarUI = document.querySelector('div[id^="mindar-ui"]');
        if (mindarUI) mindarUI.style.display = 'none';

        // Show 360
        sky.setAttribute('visible', true);
        exit360.style.display = 'block';

        fadeOut(500);
    }, { once: true });
});

/* EXIT 360 MODE */
exit360.addEventListener('click', async () => {
    console.log("Exiting 360 mode");

    fadeIn(500);
    await new Promise(res => setTimeout(res, 500));

    // Hide 360
    sky.setAttribute('visible', false);
    exit360.style.display = 'none';

    // Reset ready signal
    sceneEl.components['ar-ready-signal'].hasSignaled = false;

    // Resume AR
    const mindarSystem = sceneEl.systems['mindar-image-system'];
    mindarSystem.resume();

    // Wait until AR is actually rendering again
    sceneEl.addEventListener('arReady', () => {
        console.log("AR resumed, restoring scene");

        // Show AR content
        document.querySelectorAll('[mindar-image-target]').forEach(el => el.object3D.visible = true);

        const mindarUI = document.querySelector('div[id^="mindar-ui"]');
        if (mindarUI) mindarUI.style.display = 'block';

        fadeOut(500);

        // Show popup AFTER fade completes
        setTimeout(() => {
            confirmOverlay.style.display = 'flex';
        }, 500);

    }, { once: true });
});

/* BUTTONS */
yesBtn.addEventListener('click', () => {
    confirmOverlay.style.display = 'none';
    window.open(websiteURL, '_blank');
    setTimeout(() => { hasTriggered = false; }, 3000);
});

noBtn.addEventListener('click', () => {
    confirmOverlay.style.display = 'none';
    setTimeout(() => { hasTriggered = false; }, 5000);
});
</script>

</body>
</html>
