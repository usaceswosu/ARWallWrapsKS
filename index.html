<!DOCTYPE html>
<html>
<head>
    <title>Keystone Lake AR Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }

        .fullOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        /* ── Start screen ── */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 19999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }
        #instructions {
            margin-top: 20px;
            text-align: center;
            max-width: 80%;
            line-height: 1.5;
            color: #ccc;
        }
        #startButton {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #FFD700;
            color: #333;
            font-weight: bold;
        }
        #startButton:disabled {
            background: #888;
            color: #ccc;
            cursor: not-allowed;
        }
        #loadingMsg {
            display: none;
            margin-top: 16px;
            color: #FFD700;
            font-size: 0.95rem;
            text-align: center;
        }
        #errorMsg {
            display: none;
            margin-top: 14px;
            color: #ff6b6b;
            font-size: 0.9rem;
            text-align: center;
            max-width: 80%;
        }

        /* ── Modal card ── */
        .modal-bg  { background: rgba(0,0,0,0.78); }
        .modal-box {
            background: #1e1e1e;
            padding: 28px 22px;
            border-radius: 16px;
            border: 2px solid #FFD700;
            text-align: center;
            box-shadow: 0 0 36px rgba(0,0,0,0.7);
            max-width: 330px;
            width: 90%;
            color: white;
        }
        .modal-box h2 { margin: 0 0 6px; font-size: 1.15rem; color: #FFD700; }
        .modal-box p  { font-size: 0.9rem; color: #aaa; margin: 0 0 18px; }

        /* ── Buttons ── */
        .btn-row { display: flex; flex-direction: column; gap: 9px; }
        .btn {
            padding: 13px 18px;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: opacity 0.15s;
            width: 100%;
        }
        .btn:active  { opacity: 0.72; }
        .btn-gold    { background: #FFD700; color: #222; }
        .btn-blue    { background: #3a8fd4; color: white; }
        .btn-green   { background: #3aad6e; color: white; }
        .btn-purple  { background: #8b5cf6; color: white; }
        .btn-back    { background: transparent; color: #888; border: 1px solid #555; margin-top: 6px; }

        /* ── Panorama ── */
        #panoramaContainer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 8000;
        }
        #panoramaScene { width: 100%; height: 100%; }

        #panoBar {
            position: fixed;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 8500;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #FFD700;
            border-radius: 10px;
            padding: 8px 14px;
            backdrop-filter: blur(4px);
        }
        .pano-nav-btn {
            background: none;
            border: none;
            color: #FFD700;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }
        .pano-nav-btn:disabled { color: #555; cursor: default; }
        #panoLabel   { color: #FFD700; font-size: 0.9rem; font-weight: bold; white-space: nowrap; }
        #panoCounter { color: #aaa; font-size: 0.8rem; white-space: nowrap; }
        #exitPanorama {
            background: none; border: none;
            color: #FFD700; font-size: 0.9rem; font-weight: bold;
            cursor: pointer; padding: 0 4px; white-space: nowrap;
        }
        .pano-divider { color: #555; font-size: 1rem; }

        /* ── Video ── */
        #videoContainer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 8000;
            background: #000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #locationVideo { width: 100%; max-height: 80vh; object-fit: contain; background: #000; }
        #exitVideo {
            position: fixed;
            top: 14px; left: 50%;
            transform: translateX(-50%);
            z-index: 8500;
            padding: 10px 24px;
            font-size: 0.95rem; font-weight: bold;
            cursor: pointer;
            border: 2px solid #FFD700; border-radius: 8px;
            background: rgba(0,0,0,0.65); color: #FFD700;
            backdrop-filter: blur(4px); white-space: nowrap;
        }
    </style>
</head>
<body>

<!-- ════════════════════════════════════
     START SCREEN
════════════════════════════════════════ -->
<div id="overlay">
    <button id="startButton">Start AR Experience</button>
    <div id="instructions">
        Point your camera at the Keystone Lake map.<br>
        Approach a glowing marker to explore that area.
    </div>
    <div id="loadingMsg">⏳ Starting camera, please wait…</div>
    <div id="errorMsg"></div>
</div>


<!-- ════════════════════════════════════
     LOCATION PICKER
════════════════════════════════════════ -->
<div id="pickerOverlay" class="fullOverlay modal-bg" style="z-index:10001;">
    <div class="modal-box">
        <h2 id="pickerTitle">Select a Location</h2>
        <p>Which area would you like to explore?</p>
        <div id="pickerBtns" class="btn-row"></div>
        <button id="pickerBack" class="btn btn-back">✕ Stay Here</button>
    </div>
</div>


<!-- ════════════════════════════════════
     ACTION MENU
════════════════════════════════════════ -->
<div id="actionOverlay" class="fullOverlay modal-bg" style="z-index:10000;">
    <div class="modal-box">
        <h2 id="actionTitle"></h2>
        <p>What would you like to do?</p>
        <div id="actionBtns" class="btn-row"></div>
        <button id="actionBack" class="btn btn-back">← Back</button>
    </div>
</div>


<!-- ════════════════════════════════════
     360° PANORAMA VIEW
     ─────────────────────────────────
     JS injects one <img id="pano__<key>__<index>"> into
     <a-assets> for every panorama across all locations.
     loadPanorama() points <a-sky> at the specific ID —
     no src swapping, no cache collisions.
════════════════════════════════════════ -->
<div id="panoramaContainer">
    <a-scene id="panoramaScene"
        embedded
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: false;">

        <a-assets id="panoAssets" timeout="30000">
            <!-- populated by JS before anything else runs -->
        </a-assets>

        <a-sky id="panoSky" rotation="0 -90 0"></a-sky>

        <a-camera look-controls="enabled: true; touchEnabled: true;"
                  wasd-controls="enabled: false"
                  position="0 0 0">
        </a-camera>
    </a-scene>

    <div id="panoBar">
        <button class="pano-nav-btn" id="prevPano">&#8592;</button>
        <span id="panoLabel">Location</span>
        <span id="panoCounter"></span>
        <button class="pano-nav-btn" id="nextPano">&#8594;</button>
        <span class="pano-divider">|</span>
        <button id="exitPanorama">← Back to AR</button>
    </div>
</div>


<!-- ════════════════════════════════════
     VIDEO VIEW
════════════════════════════════════════ -->
<div id="videoContainer">
    <button id="exitVideo">← Back to AR</button>
    <video id="locationVideo" controls playsinline preload="none"></video>
</div>


<!-- ════════════════════════════════════
     MAIN AR SCENE
     autoStart: false keeps the browser from blocking an
     unprompted camera request on page load.
════════════════════════════════════════ -->
<a-scene id="arScene"
    mindar-image="imageTargetSrc: map_targets.mind;
                  autoStart: false;
                  filterMinCF: 0.0001; filterBeta: 0.001;
                  warmupTolerance: 5; missTolerance: 5;"
    vr-mode-ui="enabled: false;"
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: false; logarithmicDepthBuffer: true;">

    <a-assets>
        <img id="markerImage" src="assets/marker.png" crossorigin="anonymous">
    </a-assets>

    <a-entity mindar-image-target="targetIndex: 0">
        <a-image src="#markerImage" position="-0.35 0.30 0.03"
            width="0.12" height="0.12" material="shader: flat;"
            animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 900; loop: true">
        </a-image>
        <a-image src="#markerImage" position="-0.18 0.18 0.03"
            width="0.12" height="0.12" material="shader: flat;"
            animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 900; loop: true">
        </a-image>
        <a-image src="#markerImage" position="0.35 0.30 0.03"
            width="0.12" height="0.12" material="shader: flat;"
            animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 900; loop: true">
        </a-image>
        <a-image src="#markerImage" position="0.15 0.05 0.03"
            width="0.12" height="0.12" material="shader: flat;"
            animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 900; loop: true">
        </a-image>
        <a-image src="#markerImage" position="0.00 -0.25 0.03"
            width="0.12" height="0.12" material="shader: flat;"
            animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 900; loop: true">
        </a-image>
        <a-image src="#markerImage" position="0.35 -0.25 0.03"
            width="0.12" height="0.12" material="shader: flat;"
            animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 900; loop: true">
        </a-image>
    </a-entity>

    <a-entity id="subTarget1" mindar-image-target="targetIndex: 1"></a-entity>
    <a-entity id="subTarget2" mindar-image-target="targetIndex: 2"></a-entity>
    <a-entity id="subTarget3" mindar-image-target="targetIndex: 3"></a-entity>
    <a-entity id="subTarget4" mindar-image-target="targetIndex: 4"></a-entity>
    <a-entity id="subTarget5" mindar-image-target="targetIndex: 5"></a-entity>
    <a-entity id="subTarget6" mindar-image-target="targetIndex: 6"></a-entity>

</a-scene>


<script>
/* ════════════════════════════════════════════════════════════════
   LOCATION CONFIG
════════════════════════════════════════════════════════════════ */
const LOCATIONS = {

    feyodiCreek: {
        name:      "Feyodi Creek",
        panoramas: ["assets/Feyodi_Creek_Rec_Area.JPG"],
        video:     null,
        website:   null
    },
    cowskinBay: {
        name:      "Cowskin Bay",
        panoramas: ["assets/Cowskin_Bay_North.JPG"],
        video:     null,
        website:   null
    },
    walnutCreek: {
        name:      "Walnut Creek",
        panoramas: [
            "assets/Walnut Creek Boat Ramp.JPG",
            "assets/Walnut Creek Campground 1.JPG",
            "assets/Walnut Creek Shelter.JPG"
        ],
        video:     null,
        website:   "https://www.recreation.gov/camping/campgrounds/10041510?tab=campsites"
    },
    appalachiaBay: {
        name:      "Appalachia Bay",
        panoramas: ["assets/Appalacia_Bay_Parking_Picnic.JPG"],
        video:     "assets/Appalacia Bay Park.mp4",
        website:   "https://www.recreation.gov/camping/campgrounds/10309470"
    },
    washingtonIrving: {
        name:      "Washington Irving",
        panoramas: ["assets/Washington_Irving_South_Campground.JPG"],
        video:     "assets/Washington Irving Park.mp4",
        website:   "https://www.recreation.gov/camping/campgrounds/233667"
    },
    newMannford: {
        name:      "New Mannford",
        panoramas: [
            "assets/New_Mannford_Boat_Ramp.JPG",
            "assets/New_Mannford_Ramp_Crosstimbers.JPG"
        ],
        video:     null,
        website:   null
    },
    keystoneStatePark: {
        name:      "Keystone State Park",
        panoramas: [
            "assets/Keystone_Overlook_Dam.JPG",
            "assets/Keystone_State_Park.JPG",
            "assets/Keystone_State_Park_Gen_Store.JPG"
        ],
        video:     null,
        website:   null
    },
    whiteWaterBay: {
        name:      "White Water Bay",
        panoramas: ["assets/White_Water.JPG"],
        video:     null,
        website:   null
    },
    brushCreek: {
        name:      "Brush Creek",
        panoramas: ["assets/Brush_Creek_Rec_Area_Volleyball.JPG"],
        video:     "assets/Brush Creek Park.mp4",
        website:   "https://www.recreation.gov/camping/campgrounds/10040524"
    }

};


/* ════════════════════════════════════════════════════════════════
   SUB-TARGET CONFIG
════════════════════════════════════════════════════════════════ */
const SUB_TARGETS = [
    { type: "single", location: "feyodiCreek",  markerPos: "-0.35 0.30 0.03" },
    { type: "single", location: "cowskinBay",   markerPos: "-0.18 0.18 0.03" },
    { type: "single", location: "walnutCreek",  markerPos: "0.35 0.30 0.03"  },
    { type: "nested", pickerTitle: "Keystone Lake",
      locations: ["appalachiaBay", "washingtonIrving"], markerPos: "0.15 0.05 0.03" },
    { type: "single", location: "newMannford",  markerPos: "0.00 -0.25 0.03" },
    { type: "nested", pickerTitle: "Keystone Lake South",
      locations: ["keystoneStatePark", "whiteWaterBay", "brushCreek"], markerPos: "0.35 -0.25 0.03" }
];


/* ════════════════════════════════════════════════════════════════
   INJECT PANORAMA ASSETS
   ─────────────────────────────────────────────────────────────
   For every panorama in every location we create:
       <img id="pano__<locationKey>__<index>" src="..." crossorigin="anonymous">
   and append it to the panorama scene's <a-assets>.

   Each image gets a unique, stable ID.  When loadPanorama() calls
       panoSky.setAttribute('src', '#pano__walnutCreek__1')
   A-Frame looks up that exact cached texture — no swapping, no
   collisions with previously viewed panoramas.
════════════════════════════════════════════════════════════════ */
const panoAssets = document.querySelector('#panoAssets');

Object.entries(LOCATIONS).forEach(([locKey, loc]) => {
    loc.panoramas.forEach((src, i) => {
        const img       = document.createElement('img');
        img.id          = `pano__${locKey}__${i}`;
        img.src         = src;
        img.crossOrigin = 'anonymous';
        panoAssets.appendChild(img);
    });
});


/* ════════════════════════════════════════════════════════════════
   ELEMENT REFS
════════════════════════════════════════════════════════════════ */
const overlay        = document.querySelector('#overlay');
const startButton    = document.querySelector('#startButton');
const loadingMsg     = document.querySelector('#loadingMsg');
const errorMsg       = document.querySelector('#errorMsg');
const arScene        = document.querySelector('#arScene');

const pickerOverlay  = document.querySelector('#pickerOverlay');
const pickerTitle    = document.querySelector('#pickerTitle');
const pickerBtns     = document.querySelector('#pickerBtns');
const pickerBack     = document.querySelector('#pickerBack');

const actionOverlay  = document.querySelector('#actionOverlay');
const actionTitle    = document.querySelector('#actionTitle');
const actionBtns     = document.querySelector('#actionBtns');
const actionBack     = document.querySelector('#actionBack');

const panoramaContainer = document.querySelector('#panoramaContainer');
const panoSky           = document.querySelector('#panoSky');
const panoLabel         = document.querySelector('#panoLabel');
const panoCounter       = document.querySelector('#panoCounter');
const prevPanoBtn       = document.querySelector('#prevPano');
const nextPanoBtn       = document.querySelector('#nextPano');
const exitPanoramaBtn   = document.querySelector('#exitPanorama');

const videoContainer = document.querySelector('#videoContainer');
const locationVideo  = document.querySelector('#locationVideo');
const exitVideoBtn   = document.querySelector('#exitVideo');


/* ════════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════════ */
const triggered = new Array(SUB_TARGETS.length).fill(false);

let currentPanoKey   = "";
let currentPanoList  = [];
let currentPanoIndex = 0;
let currentPanoName  = "";

let actionCameFromPicker = false;
let activePicker         = null;


/* ════════════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════════════ */
function hideAllMenus() {
    pickerOverlay.style.display = 'none';
    actionOverlay.style.display = 'none';
}

function showPicker(targetCfg) {
    activePicker = targetCfg;
    pickerTitle.textContent = targetCfg.pickerTitle || "Select a Location";
    pickerBtns.innerHTML = "";
    targetCfg.locations.forEach(locKey => {
        const loc = LOCATIONS[locKey];
        const btn = document.createElement('button');
        btn.className   = 'btn btn-purple';
        btn.textContent = "📍 " + loc.name;
        btn.addEventListener('click', () => {
            pickerOverlay.style.display = 'none';
            showAction(locKey, true);
        });
        pickerBtns.appendChild(btn);
    });
    pickerOverlay.style.display = 'flex';
}

function showAction(locKey, fromPicker = false) {
    const loc = LOCATIONS[locKey];
    actionCameFromPicker = fromPicker;
    actionTitle.textContent = loc.name;
    actionBtns.innerHTML = "";

    if (loc.panoramas && loc.panoramas.length > 0) {
        const btn = document.createElement('button');
        btn.className   = 'btn btn-gold';
        btn.textContent = "🔭 View 360° Photo" + (loc.panoramas.length > 1 ? "s" : "");
        btn.addEventListener('click', () => enterPanorama(locKey));
        actionBtns.appendChild(btn);
    }
    if (loc.video) {
        const btn = document.createElement('button');
        btn.className   = 'btn btn-green';
        btn.textContent = "▶ Watch Location Video";
        btn.addEventListener('click', () => enterVideo(locKey));
        actionBtns.appendChild(btn);
    }
    if (loc.website) {
        const btn = document.createElement('button');
        btn.className   = 'btn btn-blue';
        btn.textContent = "🌐 Open Web Page";
        btn.addEventListener('click', () => {
            hideAllMenus();
            window.open(loc.website, '_blank');
            setTimeout(() => triggered.fill(false), 3000);
        });
        actionBtns.appendChild(btn);
    }

    actionBack.textContent = fromPicker ? "← Choose Different Location" : "✕ Stay Here";
    actionOverlay.style.display = 'flex';
}


/* ════════════════════════════════════════════════════════════════
   PANORAMA
   ─────────────────────────────────────────────────────────────
   loadPanorama() sets:
       <a-sky src="#pano__<locationKey>__<photoIndex>">
   Every photo has its own pre-registered asset ID, so A-Frame
   fetches and caches each one independently.
════════════════════════════════════════════════════════════════ */
function enterPanorama(locKey) {
    const loc = LOCATIONS[locKey];
    hideAllMenus();
    arScene.systems["mindar-image-system"].stop();

    currentPanoKey   = locKey;
    currentPanoList  = loc.panoramas;
    currentPanoIndex = 0;
    currentPanoName  = loc.name;

    loadPanorama(0);

    arScene.style.display           = 'none';
    panoramaContainer.style.display = 'block';
    setTimeout(() => window.dispatchEvent(new Event('resize')), 100);
}

function loadPanorama(index) {
    currentPanoIndex = index;
    const total      = currentPanoList.length;

    // Each photo has its own asset ID — no src mutation required.
    panoSky.setAttribute('src', `#pano__${currentPanoKey}__${index}`);

    panoLabel.textContent = currentPanoName;

    if (total > 1) {
        panoCounter.textContent   = `(${index + 1} / ${total})`;
        panoCounter.style.display = 'inline';
        prevPanoBtn.style.display = 'inline';
        nextPanoBtn.style.display = 'inline';
        prevPanoBtn.disabled      = (index === 0);
        nextPanoBtn.disabled      = (index === total - 1);
    } else {
        panoCounter.style.display = 'none';
        prevPanoBtn.style.display = 'none';
        nextPanoBtn.style.display = 'none';
    }
}

function exitPanoramaView() {
    panoramaContainer.style.display = 'none';
    arScene.style.display           = 'block';
    arScene.systems["mindar-image-system"].start();
    setTimeout(() => { window.dispatchEvent(new Event('resize')); triggered.fill(false); }, 200);
}

prevPanoBtn.addEventListener('click', () => {
    if (currentPanoIndex > 0) loadPanorama(currentPanoIndex - 1);
});
nextPanoBtn.addEventListener('click', () => {
    if (currentPanoIndex < currentPanoList.length - 1) loadPanorama(currentPanoIndex + 1);
});
exitPanoramaBtn.addEventListener('click', exitPanoramaView);


/* ════════════════════════════════════════════════════════════════
   VIDEO
════════════════════════════════════════════════════════════════ */
function enterVideo(locKey) {
    const loc = LOCATIONS[locKey];
    hideAllMenus();
    arScene.systems["mindar-image-system"].stop();
    locationVideo.src            = loc.video;
    arScene.style.display        = 'none';
    videoContainer.style.display = 'flex';
    locationVideo.play();
}

function exitVideoView() {
    locationVideo.pause();
    locationVideo.removeAttribute('src');
    locationVideo.load();
    videoContainer.style.display = 'none';
    arScene.style.display        = 'block';
    arScene.systems["mindar-image-system"].start();
    setTimeout(() => { window.dispatchEvent(new Event('resize')); triggered.fill(false); }, 200);
}

exitVideoBtn.addEventListener('click', exitVideoView);


/* ════════════════════════════════════════════════════════════════
   MODAL BACK BUTTONS
════════════════════════════════════════════════════════════════ */
pickerBack.addEventListener('click', () => {
    hideAllMenus();
    setTimeout(() => triggered.fill(false), 4000);
});

actionBack.addEventListener('click', () => {
    actionOverlay.style.display = 'none';
    if (actionCameFromPicker && activePicker) {
        showPicker(activePicker);
    } else {
        setTimeout(() => triggered.fill(false), 4000);
    }
});


/* ════════════════════════════════════════════════════════════════
   START BUTTON
   ─────────────────────────────────────────────────────────────
   MindAR fetches and parses the .mind file during scene init
   even with autoStart:false. On large files or slow connections
   this takes well over 15 s — the old code timed out before it
   finished. Fix: poll generously for the system (60 s), show
   live status so the user knows something is happening, then
   fire .start() without await so the overlay hides immediately
   and MindAR paints the camera feed on its own schedule.
════════════════════════════════════════════════════════════════ */
startButton.addEventListener('click', async () => {
    startButton.disabled     = true;
    startButton.textContent  = 'Loading…';
    loadingMsg.textContent   = '⏳ Loading AR targets, please wait…';
    loadingMsg.style.display = 'block';
    errorMsg.style.display   = 'none';

    try {
        // Poll every 250 ms until MindAR has registered its system.
        // We skip the hasLoaded check entirely — it adds a separate
        // timeout race and the system poll already covers both cases.
        const mindARSystem = await new Promise((resolve, reject) => {
            const TIMEOUT_MS = 60000; // 60 s — generous for large .mind files
            const t  = setTimeout(() => reject(new Error(
                'AR targets took too long to load. Please check your connection and refresh.'
            )), TIMEOUT_MS);

            const iv = setInterval(() => {
                const sys = arScene.systems && arScene.systems["mindar-image-system"];
                if (sys && typeof sys.start === 'function') {
                    clearInterval(iv);
                    clearTimeout(t);
                    resolve(sys);
                }
            }, 250);
        });

        // Update message briefly so user knows we're now starting the camera
        loadingMsg.textContent = '📷 Starting camera…';

        // Fire start() without await — its promise resolves only after
        // full tracking warmup (many seconds). Hiding the overlay now
        // lets MindAR render the camera feed while it warms up.
        mindARSystem.start().catch(err => {
            console.error('MindAR start failed:', err);
            overlay.style.display    = 'flex';
            startButton.disabled     = false;
            startButton.textContent  = 'Try Again';
            loadingMsg.style.display = 'none';
            let msg = '⚠️ Could not start the camera.';
            if (err && (err.name === 'NotAllowedError' || String(err).includes('permission'))) {
                msg = '⚠️ Camera access was denied. Please allow it in your browser settings and try again.';
            } else if (err && err.message) {
                msg = '⚠️ ' + err.message;
            }
            errorMsg.textContent   = msg;
            errorMsg.style.display = 'block';
        });

        overlay.style.display = 'none';
        setTimeout(() => window.dispatchEvent(new Event('resize')), 100);

    } catch (err) {
        console.error('AR init failed:', err);
        startButton.disabled     = false;
        startButton.textContent  = 'Try Again';
        loadingMsg.style.display = 'none';
        errorMsg.textContent     = '⚠️ ' + (err.message || 'Failed to load AR scene.');
        errorMsg.style.display   = 'block';
    }
});


/* ════════════════════════════════════════════════════════════════
   SUB-TARGET WIRING
════════════════════════════════════════════════════════════════ */
SUB_TARGETS.forEach((cfg, i) => {
    const entity = document.querySelector(`#subTarget${i + 1}`);

    entity.addEventListener('targetFound', () => {
        if (triggered[i]) return;
        triggered[i] = true;
        if (cfg.type === 'nested') {
            showPicker(cfg);
        } else {
            showAction(cfg.location, false);
        }
    });

    entity.addEventListener('targetLost', () => {
        triggered[i] = false;
    });
});

</script>
