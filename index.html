<!DOCTYPE html>
<html>
<head>
    <title>Keystone Lake AR Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* ── Full-screen overlay base ── */
        .fullOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        /* ── Start screen ── */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 19999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }
        #instructions {
            margin-top: 20px;
            text-align: center;
            max-width: 80%;
            line-height: 1.5;
            color: #ccc;
        }
        #startButton {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #FFD700;
            color: #333;
            font-weight: bold;
        }
        #startButton:disabled {
            background: #888;
            color: #ccc;
            cursor: not-allowed;
        }

        /* Loading spinner shown while MindAR warms up */
        #loadingMsg {
            display: none;
            margin-top: 16px;
            color: #FFD700;
            font-size: 0.95rem;
            text-align: center;
        }
        #errorMsg {
            display: none;
            margin-top: 14px;
            color: #ff6b6b;
            font-size: 0.9rem;
            text-align: center;
            max-width: 80%;
        }

        /* ── Shared modal card ── */
        .modal-bg {
            background: rgba(0,0,0,0.78);
        }
        .modal-box {
            background: #1e1e1e;
            padding: 28px 22px;
            border-radius: 16px;
            border: 2px solid #FFD700;
            text-align: center;
            box-shadow: 0 0 36px rgba(0,0,0,0.7);
            max-width: 330px;
            width: 90%;
            color: white;
        }
        .modal-box h2 {
            margin: 0 0 6px;
            font-size: 1.15rem;
            color: #FFD700;
        }
        .modal-box p {
            font-size: 0.9rem;
            color: #aaa;
            margin: 0 0 18px;
        }

        /* ── Button styles ── */
        .btn-row {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }
        .btn {
            padding: 13px 18px;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: opacity 0.15s;
            width: 100%;
        }
        .btn:active { opacity: 0.72; }
        .btn-gold   { background: #FFD700; color: #222; }
        .btn-blue   { background: #3a8fd4; color: white; }
        .btn-green  { background: #3aad6e; color: white; }
        .btn-purple { background: #8b5cf6; color: white; }
        .btn-muted  { background: #444;    color: #bbb; }
        .btn-back   { background: transparent; color: #888;
                      border: 1px solid #555; margin-top: 6px; }

        /* ── Panorama container ── */
        #panoramaContainer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 8000;
            background: #000;
        }
        #panoCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #panoLoading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            color: #FFD700;
            font-size: 1rem;
            pointer-events: none;
        }

        /* Floating bar over panorama */
        #panoBar {
            position: fixed;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 8500;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #FFD700;
            border-radius: 10px;
            padding: 8px 14px;
            backdrop-filter: blur(4px);
        }
        .pano-nav-btn {
            background: none;
            border: none;
            color: #FFD700;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }
        .pano-nav-btn:disabled { color: #555; cursor: default; }
        #panoLabel {
            color: #FFD700;
            font-size: 0.9rem;
            font-weight: bold;
            white-space: nowrap;
        }
        #panoCounter {
            color: #aaa;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        #exitPanorama {
            background: none;
            border: none;
            color: #FFD700;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            padding: 0 4px;
            white-space: nowrap;
        }
        .pano-divider {
            color: #555;
            font-size: 1rem;
        }

        /* ── Video container ── */
        #videoContainer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 8000;
            background: #000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #locationVideo {
            width: 100%;
            max-height: 80vh;
            object-fit: contain;
            background: #000;
        }
        #exitVideo {
            position: fixed;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 8500;
            padding: 10px 24px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #FFD700;
            border-radius: 8px;
            background: rgba(0,0,0,0.65);
            color: #FFD700;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }
    </style>
</head>
<body>

<!-- ════════════════════════════════════════
     START SCREEN
════════════════════════════════════════ -->
<div id="overlay">
    <button id="startButton">Start AR Experience</button>
    <div id="instructions">
        Point your camera at the Keystone Lake map.<br>
        Approach a glowing marker to explore that area.
    </div>
    <div id="loadingMsg">⏳ Starting camera, please wait…</div>
    <div id="errorMsg"></div>
</div>


<!-- ════════════════════════════════════════
     LOCATION PICKER (nested targets only)
     Populated dynamically by JS
════════════════════════════════════════ -->
<div id="pickerOverlay" class="fullOverlay modal-bg" style="z-index: 10001;">
    <div class="modal-box">
        <h2 id="pickerTitle">Select a Location</h2>
        <p>Which area would you like to explore?</p>
        <div id="pickerBtns" class="btn-row"></div>
        <button id="pickerBack" class="btn btn-back">✕ Stay Here</button>
    </div>
</div>


<!-- ════════════════════════════════════════
     ACTION MENU (single or after picker)
     Populated dynamically by JS
════════════════════════════════════════ -->
<div id="actionOverlay" class="fullOverlay modal-bg" style="z-index: 10000;">
    <div class="modal-box">
        <h2 id="actionTitle"></h2>
        <p>What would you like to do?</p>
        <div id="actionBtns" class="btn-row"></div>
        <button id="actionBack" class="btn btn-back">← Back</button>
    </div>
</div>


<!-- ════════════════════════════════════════
     360° PANORAMA VIEW
     Pure Three.js — no second <a-scene>.
     A-Frame doesn't support two scenes on one page; the second
     scene never gets a proper WebGL context → white screen.
     Three.js is already bundled inside A-Frame (window.THREE).
════════════════════════════════════════ -->
<div id="panoramaContainer">
    <canvas id="panoCanvas"></canvas>
    <div id="panoLoading">⏳ Loading photo…</div>

    <!-- Navigation bar: ← location name  1/3  → | Back to AR -->
    <div id="panoBar">
        <button class="pano-nav-btn" id="prevPano">&#8592;</button>
        <span id="panoLabel">Location</span>
        <span id="panoCounter"></span>
        <button class="pano-nav-btn" id="nextPano">&#8594;</button>
        <span class="pano-divider">|</span>
        <button id="exitPanorama">← Back to AR</button>
    </div>
</div>


<!-- ════════════════════════════════════════
     VIDEO VIEW
════════════════════════════════════════ -->
<div id="videoContainer">
    <button id="exitVideo">← Back to AR</button>
    <video id="locationVideo" controls playsinline preload="none"></video>
</div>


<!-- ════════════════════════════════════════
     MAIN AR SCENE

     KEY FIX: autoStart: false — prevents MindAR from requesting
     the camera immediately on page load (which browsers block
     without a user gesture, causing the white-screen freeze).
     The camera is started explicitly when the user taps the button.

     .mind file must contain targets in this order:
       Index 0 — main map poster
       Index 1 — Feyodi Creek        (top-left)
       Index 2 — Cowskin Bay         (top-left, lower/right)
       Index 3 — Walnut Creek        (top-right)
       Index 4 — Appalachia/Wash.Irv (just right of center)
       Index 5 — New Mannford        (bottom-center)
       Index 6 — Keystone/WW/Brush   (bottom-right)
════════════════════════════════════════ -->
<a-scene id="arScene"
    mindar-image="imageTargetSrc: map_targets.mind;
                  autoStart: false;
                  filterMinCF: 0.0001; filterBeta: 0.001;
                  warmupTolerance: 5; missTolerance: 5;"
    vr-mode-ui="enabled: false;"
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: false; logarithmicDepthBuffer: true;">

    <a-assets>
        <img id="markerImage" src="assets/marker.png" crossorigin="anonymous">
    </a-assets>

    <!-- NOTE: No explicit <a-camera> here.
         MindAR injects its own camera for the AR feed.
         Adding a second camera caused conflicts on some devices. -->

    <!-- Main poster — marker dots positioned to match each sub-target location.
         Adjust the `position` values here to align with your printed map. -->
    <a-entity mindar-image-target="targetIndex: 0">

        <!-- Feyodi Creek — top-left -->
        <a-image src="#markerImage" position="-0.35 0.30 0.03"
            width="0.12" height="0.12" material="shader: flat;"
            animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 900; loop: true">
        </a-image>

        <!-- Cowskin Bay — top-left, lower and right of Feyodi -->
        <a-image src="#markerImage" position="-0.18 0.18 0.03"
            width="0.12" height="0.12" material="shader: flat;"
            animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 900; loop: true">
        </a-image>

        <!-- Walnut Creek — top-right -->
        <a-image src="#markerImage" position="0.35 0.30 0.03"
            width="0.12" height="0.12" material="shader: flat;"
            animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 900; loop: true">
        </a-image>

        <!-- Appalachia Bay / Washington Irving — just right of center -->
        <a-image src="#markerImage" position="0.15 0.05 0.03"
            width="0.12" height="0.12" material="shader: flat;"
            animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 900; loop: true">
        </a-image>

        <!-- New Mannford — bottom-center -->
        <a-image src="#markerImage" position="0.00 -0.25 0.03"
            width="0.12" height="0.12" material="shader: flat;"
            animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 900; loop: true">
        </a-image>

        <!-- Keystone / White Water / Brush Creek — bottom-right -->
        <a-image src="#markerImage" position="0.35 -0.25 0.03"
            width="0.12" height="0.12" material="shader: flat;"
            animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 900; loop: true">
        </a-image>

    </a-entity>

    <!-- Sub-target entities — one per physical sub-target image -->
    <a-entity id="subTarget1" mindar-image-target="targetIndex: 1"></a-entity>
    <a-entity id="subTarget2" mindar-image-target="targetIndex: 2"></a-entity>
    <a-entity id="subTarget3" mindar-image-target="targetIndex: 3"></a-entity>
    <a-entity id="subTarget4" mindar-image-target="targetIndex: 4"></a-entity>
    <a-entity id="subTarget5" mindar-image-target="targetIndex: 5"></a-entity>
    <a-entity id="subTarget6" mindar-image-target="targetIndex: 6"></a-entity>

</a-scene>


<script>
/* ════════════════════════════════════════════════════════════════
   LOCATION CONFIG
   ─────────────────────────────────────────────────────────────
   Each entry describes one visitable location.

   panoramas : array of image paths.
               • One path   → single 360° photo, no nav arrows.
               • Two+ paths → multiple photos; prev/next arrows
                              appear automatically in the viewer.

   video     : path to an .mp4, or null if none.
   website   : URL string, or null if none.
════════════════════════════════════════════════════════════════ */
const LOCATIONS = {

    feyodiCreek: {
        name:      "Feyodi Creek",
        panoramas: ["assets/Feyodi_Creek_Rec_Area.JPG"],
        video:     null,
        website:   null
    },

    cowskinBay: {
        name:      "Cowskin Bay",
        panoramas: ["assets/Cowskin_Bay_North.JPG"],
        video:     null,
        website:   null
    },

    walnutCreek: {
        name:      "Walnut Creek",
        panoramas: [
                    "assets/Walnut Creek Boat Ramp.JPG",
                    "assets/Walnut Creek Campground 1.JPG",
                    "assets/Walnut Creek Shelter.JPG"
                   ],
        video:     null,
        website:   "https://www.recreation.gov/camping/campgrounds/10041510?tab=campsites"
    },

    appalachiaBay: {
        name:      "Appalachia Bay",
        panoramas: ["assets/Appalacia_Bay_Parking_Picnic.JPG"],
        video:     "assets/Appalacia Bay Park.mp4",
        website:   "https://www.recreation.gov/camping/campgrounds/10309470"
    },

    washingtonIrving: {
        name:      "Washington Irving",
        panoramas: ["assets/Washington_Irving_South_Campground.JPG"],
        video:     "assets/Washington Irving Park.mp4",
        website:   "https://www.recreation.gov/camping/campgrounds/233667"
    },

    newMannford: {
        name:      "New Mannford",
        panoramas: [
                    "assets/New_Mannford_Boat_Ramp.JPG",
                    "assets/New_Mannford_Ramp_Crosstimbers.JPG"
                    ],
        video:     null,
        website:   null
    },

    keystoneStatePark: {
        name:      "Keystone State Park",
        panoramas: ["assets/Keystone_Overlook_Dam.JPG",
                    "assets/Keystone_State_Park.JPG",
                    "assets/Keystone_State_Park_Gen_Store.JPG"
                   ],
        video:     null,
        website:   null
    },

    whiteWaterBay: {
        name:      "White Water Bay",
        panoramas: ["assets/White_Water.JPG"],
        video:     null,
        website:   null
    },

    brushCreek: {
        name:      "Brush Creek",
        panoramas: ["assets/Brush_Creek_Rec_Area_Volleyball.JPG"],
        video:     "assets/Brush Creek Park.mp4",
        website:   "https://www.recreation.gov/camping/campgrounds/10040524"
    }

};


/* ════════════════════════════════════════════════════════════════
   SUB-TARGET CONFIG
════════════════════════════════════════════════════════════════ */
const SUB_TARGETS = [

    {   // Index 1
        type:       "single",
        location:   "feyodiCreek",
        markerPos:  "-0.35 0.30 0.03"
    },
    {   // Index 2
        type:       "single",
        location:   "cowskinBay",
        markerPos:  "-0.18 0.18 0.03"
    },
    {   // Index 3
        type:       "single",
        location:   "walnutCreek",
        markerPos:  "0.35 0.30 0.03"
    },
    {   // Index 4 — nested: two locations share one sub-target
        type:         "nested",
        pickerTitle:  "Keystone Lake",
        locations:    ["appalachiaBay", "washingtonIrving"],
        markerPos:    "0.15 0.05 0.03"
    },
    {   // Index 5
        type:       "single",
        location:   "newMannford",
        markerPos:  "0.00 -0.25 0.03"
    },
    {   // Index 6 — nested: three locations share one sub-target
        type:         "nested",
        pickerTitle:  "Keystone Lake South",
        locations:    ["keystoneStatePark", "whiteWaterBay", "brushCreek"],
        markerPos:    "0.35 -0.25 0.03"
    }

];


/* ════════════════════════════════════════════════════════════════
   ELEMENT REFS
════════════════════════════════════════════════════════════════ */
const overlay           = document.querySelector('#overlay');
const startButton       = document.querySelector('#startButton');
const loadingMsg        = document.querySelector('#loadingMsg');
const errorMsg          = document.querySelector('#errorMsg');
const arScene           = document.querySelector('#arScene');

// Picker overlay
const pickerOverlay     = document.querySelector('#pickerOverlay');
const pickerTitle       = document.querySelector('#pickerTitle');
const pickerBtns        = document.querySelector('#pickerBtns');
const pickerBack        = document.querySelector('#pickerBack');

// Action overlay
const actionOverlay     = document.querySelector('#actionOverlay');
const actionTitle       = document.querySelector('#actionTitle');
const actionBtns        = document.querySelector('#actionBtns');
const actionBack        = document.querySelector('#actionBack');

// Panorama
const panoramaContainer = document.querySelector('#panoramaContainer');
const panoCanvas        = document.querySelector('#panoCanvas');
const panoLoadingEl     = document.querySelector('#panoLoading');
const panoLabel         = document.querySelector('#panoLabel');
const panoCounter       = document.querySelector('#panoCounter');
const prevPanoBtn       = document.querySelector('#prevPano');
const nextPanoBtn       = document.querySelector('#nextPano');
const exitPanoramaBtn   = document.querySelector('#exitPanorama');

// Video
const videoContainer    = document.querySelector('#videoContainer');
const locationVideo     = document.querySelector('#locationVideo');
const exitVideoBtn      = document.querySelector('#exitVideo');


/* ════════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════════ */
const triggered = new Array(SUB_TARGETS.length).fill(false);

let currentPanoList  = [];
let currentPanoIndex = 0;
let currentPanoName  = "";

let actionCameFromPicker = false;
let activePicker = null;


/* ════════════════════════════════════════════════════════════════
   HIDE / SHOW HELPERS
════════════════════════════════════════════════════════════════ */
function hideAllMenus() {
    pickerOverlay.style.display = 'none';
    actionOverlay.style.display = 'none';
}

function showPicker(targetCfg) {
    activePicker = targetCfg;
    pickerTitle.textContent = targetCfg.pickerTitle || "Select a Location";
    pickerBtns.innerHTML = "";

    targetCfg.locations.forEach(locKey => {
        const loc = LOCATIONS[locKey];
        const btn = document.createElement('button');
        btn.className = 'btn btn-purple';
        btn.textContent = "📍 " + loc.name;
        btn.addEventListener('click', () => {
            pickerOverlay.style.display = 'none';
            showAction(locKey, true);
        });
        pickerBtns.appendChild(btn);
    });

    pickerOverlay.style.display = 'flex';
}

function showAction(locKey, fromPicker = false) {
    const loc = LOCATIONS[locKey];
    actionCameFromPicker = fromPicker;

    actionTitle.textContent = loc.name;
    actionBtns.innerHTML = "";

    if (loc.panoramas && loc.panoramas.length > 0) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-gold';
        btn.textContent = "🔭 View 360° Photo" + (loc.panoramas.length > 1 ? "s" : "");
        btn.addEventListener('click', () => enterPanorama(locKey));
        actionBtns.appendChild(btn);
    }

    if (loc.video) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-green';
        btn.textContent = "▶ Watch Location Video";
        btn.addEventListener('click', () => enterVideo(locKey));
        actionBtns.appendChild(btn);
    }

    if (loc.website) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-blue';
        btn.textContent = "🌐 Open Web Page";
        btn.addEventListener('click', () => {
            hideAllMenus();
            window.open(loc.website, '_blank');
            setTimeout(() => triggered.fill(false), 3000);
        });
        actionBtns.appendChild(btn);
    }

    actionBack.textContent = fromPicker ? "← Choose Different Location" : "✕ Stay Here";
    actionOverlay.style.display = 'flex';
}


/* ════════════════════════════════════════════════════════════════
   PANORAMA — Three.js direct renderer
   ─────────────────────────────────────────────────────────────
   Why: A-Frame doesn't support two <a-scene> elements on one page.
   The embedded panorama scene never received a real WebGL context,
   producing a permanent white screen no matter what src was set.

   Fix: use window.THREE (bundled inside A-Frame) to create our own
   WebGLRenderer on a plain <canvas>.  A textured sphere with its
   normals flipped inward gives a standard equirectangular 360° view.
   Touch and mouse drag control the camera look direction.
════════════════════════════════════════════════════════════════ */
let panoRenderer  = null;   // THREE.WebGLRenderer
let panoScene3    = null;   // THREE.Scene
let panoCamera3   = null;   // THREE.PerspectiveCamera
let panoSphere    = null;   // THREE.Mesh  (inside-out sphere)
let panoAnimFrame = null;   // requestAnimationFrame id

// Look-control state
let panoPointerDown = false;
let panoLastX = 0, panoLastY = 0;
let panoCameraLon = 0, panoCameraLat = 0;   // degrees

function initPanoRenderer() {
    const W = window.innerWidth;
    const H = window.innerHeight;

    panoRenderer = new THREE.WebGLRenderer({ canvas: panoCanvas, antialias: true });
    panoRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    panoRenderer.setSize(W, H);

    panoScene3  = new THREE.Scene();
    panoCamera3 = new THREE.PerspectiveCamera(75, W / H, 0.1, 1000);

    // Sphere: scale x by -1 to flip normals inward so the texture
    // appears on the inside (standard equirectangular panorama trick).
    const geo = new THREE.SphereGeometry(500, 64, 32);
    geo.scale(-1, 1, 1);
    const mat = new THREE.MeshBasicMaterial({ color: 0x222222 });
    panoSphere = new THREE.Mesh(geo, mat);
    panoScene3.add(panoSphere);

    // ── Pointer / touch controls ──────────────────────────────
    function onDown(x, y) { panoPointerDown = true; panoLastX = x; panoLastY = y; }
    function onMove(x, y) {
        if (!panoPointerDown) return;
        panoCameraLon -= (x - panoLastX) * 0.25;
        panoCameraLat += (y - panoLastY) * 0.15;
        panoCameraLat  = Math.max(-85, Math.min(85, panoCameraLat));
        panoLastX = x; panoLastY = y;
    }
    function onUp() { panoPointerDown = false; }

    panoCanvas.addEventListener('mousedown',  e => onDown(e.clientX, e.clientY));
    panoCanvas.addEventListener('mousemove',  e => onMove(e.clientX, e.clientY));
    panoCanvas.addEventListener('mouseup',    onUp);
    panoCanvas.addEventListener('mouseleave', onUp);

    panoCanvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    panoCanvas.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    panoCanvas.addEventListener('touchend',   onUp);

    // Resize
    window.addEventListener('resize', () => {
        if (!panoRenderer) return;
        panoRenderer.setSize(window.innerWidth, window.innerHeight);
        panoCamera3.aspect = window.innerWidth / window.innerHeight;
        panoCamera3.updateProjectionMatrix();
    });
}

function panoRenderLoop() {
    panoAnimFrame = requestAnimationFrame(panoRenderLoop);
    const phi   = THREE.MathUtils.degToRad(90 - panoCameraLat);
    const theta = THREE.MathUtils.degToRad(panoCameraLon);
    panoCamera3.lookAt(
        500 * Math.sin(phi) * Math.cos(theta),
        500 * Math.cos(phi),
        500 * Math.sin(phi) * Math.sin(theta)
    );
    panoRenderer.render(panoScene3, panoCamera3);
}

function enterPanorama(locKey) {
    const loc = LOCATIONS[locKey];
    hideAllMenus();
    arScene.systems["mindar-image-system"].stop();

    currentPanoList  = loc.panoramas;
    currentPanoIndex = 0;
    currentPanoName  = loc.name;
    panoCameraLon    = 0;
    panoCameraLat    = 0;

    arScene.style.display        = 'none';
    panoramaContainer.style.display = 'block';

    // Build the renderer once (lazy init keeps startup fast)
    if (!panoRenderer) initPanoRenderer();

    loadPanorama(0);
    panoRenderLoop();
}

function loadPanorama(index) {
    currentPanoIndex = index;
    const total = currentPanoList.length;

    panoLoadingEl.style.display = 'block';

    // TextureLoader works directly — no A-Frame asset pipeline involved
    const loader = new THREE.TextureLoader();
    loader.crossOrigin = 'anonymous';
    loader.load(
        currentPanoList[index],
        (texture) => {
            // Swap the sphere's material map and mark it dirty
            panoSphere.material.map = texture;
            panoSphere.material.color.set(0xffffff);   // reveal texture
            panoSphere.material.needsUpdate = true;
            panoLoadingEl.style.display = 'none';
        },
        undefined,
        (err) => {
            console.error('Panorama load error:', currentPanoList[index], err);
            panoLoadingEl.textContent = '⚠️ Could not load photo.';
        }
    );

    panoLabel.textContent = currentPanoName;

    if (total > 1) {
        panoCounter.textContent    = `(${index + 1} / ${total})`;
        panoCounter.style.display  = 'inline';
        prevPanoBtn.style.display  = 'inline';
        nextPanoBtn.style.display  = 'inline';
        prevPanoBtn.disabled       = (index === 0);
        nextPanoBtn.disabled       = (index === total - 1);
    } else {
        panoCounter.style.display = 'none';
        prevPanoBtn.style.display = 'none';
        nextPanoBtn.style.display = 'none';
    }
}

function exitPanoramaView() {
    if (panoAnimFrame) { cancelAnimationFrame(panoAnimFrame); panoAnimFrame = null; }
    panoramaContainer.style.display = 'none';
    arScene.style.display = 'block';
    arScene.systems["mindar-image-system"].start();
    setTimeout(() => {
        window.dispatchEvent(new Event('resize'));
        triggered.fill(false);
    }, 200);
}

prevPanoBtn.addEventListener('click', () => {
    if (currentPanoIndex > 0) loadPanorama(currentPanoIndex - 1);
});
nextPanoBtn.addEventListener('click', () => {
    if (currentPanoIndex < currentPanoList.length - 1) loadPanorama(currentPanoIndex + 1);
});
exitPanoramaBtn.addEventListener('click', () => exitPanoramaView());


/* ════════════════════════════════════════════════════════════════
   VIDEO
════════════════════════════════════════════════════════════════ */
function enterVideo(locKey) {
    const loc = LOCATIONS[locKey];
    hideAllMenus();
    arScene.systems["mindar-image-system"].stop();

    locationVideo.src = loc.video;
    arScene.style.display = 'none';
    videoContainer.style.display = 'flex';
    locationVideo.play();
}

function exitVideoView() {
    locationVideo.pause();
    locationVideo.removeAttribute('src');
    locationVideo.load();
    videoContainer.style.display = 'none';
    arScene.style.display = 'block';
    arScene.systems["mindar-image-system"].start();
    setTimeout(() => {
        window.dispatchEvent(new Event('resize'));
        triggered.fill(false);
    }, 200);
}

exitVideoBtn.addEventListener('click', () => exitVideoView());


/* ════════════════════════════════════════════════════════════════
   MODAL BACK BUTTONS
════════════════════════════════════════════════════════════════ */
pickerBack.addEventListener('click', () => {
    hideAllMenus();
    setTimeout(() => triggered.fill(false), 4000);
});

actionBack.addEventListener('click', () => {
    actionOverlay.style.display = 'none';
    if (actionCameFromPicker && activePicker) {
        showPicker(activePicker);
    } else {
        setTimeout(() => triggered.fill(false), 4000);
    }
});


/* ════════════════════════════════════════════════════════════════
   START BUTTON
   ─────────────────────────────────────────────────────────────
   FIX SUMMARY:
   1. Wait for A-Frame scene to fully load before calling .start()
      (avoids "cannot read property of undefined" on the system).
   2. Wrap in try/catch and surface a readable error message so
      the user knows to grant camera permission instead of seeing
      a blank screen.
   3. Show a loading message while MindAR warms up.
════════════════════════════════════════════════════════════════ */
startButton.addEventListener('click', async () => {
    startButton.disabled = true;
    startButton.textContent = 'Starting…';
    loadingMsg.style.display = 'block';
    errorMsg.style.display   = 'none';

    try {
        // Wait for A-Frame's internal scene setup if not done yet
        if (!arScene.hasLoaded) {
            await new Promise((resolve, reject) => {
                const timeout = setTimeout(() => reject(new Error('Scene load timed out')), 15000);
                arScene.addEventListener('loaded', () => {
                    clearTimeout(timeout);
                    resolve();
                }, { once: true });
            });
        }

        // DON'T await start() — MindAR's promise only resolves after the
        // camera is fully warmed up and tracking, which takes several seconds
        // and makes the app look frozen. Fire it, hide the overlay immediately,
        // and let MindAR paint its camera feed to the canvas on its own schedule.
        arScene.systems["mindar-image-system"].start()
            .catch(err => {
                // Camera permission denied or hardware error — put overlay back
                console.error("MindAR start failed:", err);
                overlay.style.display = 'flex';
                startButton.disabled = false;
                startButton.textContent = 'Try Again';
                loadingMsg.style.display = 'none';
                let msg = '⚠️ Could not start the camera.';
                if (err && (err.name === 'NotAllowedError' || String(err).includes('permission'))) {
                    msg = '⚠️ Camera access was denied. Please allow camera permission and try again.';
                } else if (err && err.message) {
                    msg = '⚠️ ' + err.message;
                }
                errorMsg.textContent = msg;
                errorMsg.style.display = 'block';
            });

        // Hide the start overlay right away — MindAR shows the camera feed itself
        overlay.style.display = 'none';
        setTimeout(() => window.dispatchEvent(new Event('resize')), 100);

    } catch (err) {
        // Scene load timed out
        console.error("Scene setup failed:", err);
        startButton.disabled = false;
        startButton.textContent = 'Try Again';
        loadingMsg.style.display = 'none';
        errorMsg.textContent = '⚠️ ' + (err.message || 'Failed to load AR scene.');
        errorMsg.style.display = 'block';
    }
});


/* ════════════════════════════════════════════════════════════════
   SUB-TARGET WIRING
   Loops over SUB_TARGETS config — no manual per-target code needed.
════════════════════════════════════════════════════════════════ */
SUB_TARGETS.forEach((cfg, i) => {
    const entity = document.querySelector(`#subTarget${i + 1}`);

    entity.addEventListener('targetFound', () => {
        if (triggered[i]) return;
        triggered[i] = true;

        if (cfg.type === 'nested') {
            showPicker(cfg);
        } else {
            showAction(cfg.location, false);
        }
    });

    entity.addEventListener('targetLost', () => {
        triggered[i] = false;
    });
});

</script>
