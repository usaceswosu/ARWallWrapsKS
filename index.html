<!DOCTYPE html>
<html>
<head>
    <title>AR Wall Prototype: Smooth Redirect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* ── Fade overlay ── */
        #fadeOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: black;
            z-index: 20000;
            opacity: 0;
            pointer-events: none;                    /* transparent = passthrough clicks */
            transition: opacity 0.5s ease;
        }

        /* When .fading class is applied, it becomes visible + blocks input */
        #fadeOverlay.fading {
            opacity: 1;
            pointer-events: all;
        }

        /* ── Start overlay ── */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }

        #instructions {
            margin-top: 20px;
            text-align: center;
            max-width: 80%;
            line-height: 1.4;
        }

        /* ── Confirm overlay ── */
        #confirmOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: #222;
            padding: 30px 24px;
            border-radius: 16px;
            border: 2px solid #FFD700;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            max-width: 320px;
            width: 90%;
            color: white;
        }

        .modal-box h2 {
            margin: 0 0 8px;
            font-size: 1.2rem;
            color: #FFD700;
        }

        .modal-box p {
            font-size: 0.95rem;
            color: #ccc;
            margin: 0 0 20px;
        }

        .btn-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 13px 20px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: opacity 0.15s;
        }
        .btn:active { opacity: 0.75; }

        .btn-gold   { background: #FFD700; color: #222; }
        .btn-blue   { background: #3a8fd4; color: white; }
        .btn-muted  { background: #555;    color: #ccc; }

        /* ── 360 panorama container ── */
        #panoramaContainer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 8000;
        }

        #panoramaScene {
            width: 100%;
            height: 100%;
        }

        /* Exit button floats over the panorama */
        #exitPanorama {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 8500;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            background: rgba(0,0,0,0.65);
            color: #FFD700;
            border: 2px solid #FFD700;
            backdrop-filter: blur(4px);
        }

        button#startButton {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #FFD700;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- ── Fade overlay (sits above everything) ── -->
    <div id="fadeOverlay"></div>

    <!-- ── Start screen ── -->
    <div id="overlay">
        <button id="startButton">Start AR Experience</button>
        <div id="instructions">
            Point at the poster.<br>
            Walk closer to markers to trigger activities.
        </div>
    </div>

    <!-- ── Sub-target action modal ── -->
    <div id="confirmOverlay">
        <div class="modal-box">
            <h2>Keystone Lake: Bull Creek Boat Ramp</h2>
            <p>What would you like to do?</p>
            <div class="btn-row">
                <button class="btn btn-gold"  id="btn360">🔭 View 360° Campground</button>
                <button class="btn btn-blue"  id="btnWebsite">🌐 Open Boat Ramp Page</button>
                <button class="btn btn-muted" id="btnNone">✕ Stay Here</button>
            </div>
        </div>
    </div>

    <!-- ── 360° panorama view ── -->
    <div id="panoramaContainer">
        <a-scene id="panoramaScene"
            embedded
            vr-mode-ui="enabled: false"
            device-orientation-permission-ui="enabled: false"
            renderer="colorManagement: false;">
            <a-assets>
                <img id="panoramaImg" src="assets/panorama.png" crossorigin="anonymous">
            </a-assets>
            <a-sky src="#panoramaImg" rotation="0 -90 0"></a-sky>
            <a-camera look-controls="enabled: true; touchEnabled: true;" wasd-controls="enabled: false"
                      position="0 0 0">
            </a-camera>
        </a-scene>
        <button id="exitPanorama">← Back to AR</button>
    </div>

    <!-- ── Main AR scene ── -->
    <a-scene id="arScene"
        mindar-image="imageTargetSrc: target_with_sub.mind; filterMinCF: 0.0001; filterBeta: 0.001; warmupTolerance: 5; missTolerance: 5;"
        vr-mode-ui="enabled: false;"
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: false; logarithmicDepthBuffer: true;">

        <a-assets>
            <img id="markerImage" src="assets/marker.png" crossorigin="anonymous">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-image
                src="#markerImage"
                position="0.3 0.2 0.03"
                width="0.15" height="0.15"
                material="shader: flat;"
                animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; dur: 1000; loop: true">
            </a-image>
            <a-image
                src="#markerImage"
                position="-0.3 0.0 0.03"
                width="0.15" height="0.15"
                material="shader: flat;"
                animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; dur: 1000; loop: true">
            </a-image>
        </a-entity>

        <a-entity id="subTarget" mindar-image-target="targetIndex: 1"></a-entity>

    </a-scene>

    <script>
        const websiteURL = "https://www.recreation.gov/activitypass/AP22376";

        let hasTriggered = false;

        /* ── Element refs ── */
        const overlay            = document.querySelector('#overlay');
        const startButton        = document.querySelector('#startButton');
        const confirmOverlay     = document.querySelector('#confirmOverlay');
        const btn360             = document.querySelector('#btn360');
        const btnWebsite         = document.querySelector('#btnWebsite');
        const btnNone            = document.querySelector('#btnNone');
        const subTarget          = document.querySelector('#subTarget');
        const panoramaContainer  = document.querySelector('#panoramaContainer');
        const exitPanoramaBtn    = document.querySelector('#exitPanorama');
        const arScene            = document.querySelector('#arScene');
        const fadeOverlay        = document.querySelector('#fadeOverlay');
        const panoramaImg        = document.querySelector('#panoramaImg');

        /* ── Fade helpers ── */
        // FADE_MS must match the CSS transition duration (0.5s = 500ms)
        const FADE_MS = 500;

        // Returns a promise that resolves once the screen has faded TO black
        function fadeToBlack() {
            return new Promise(resolve => {
                fadeOverlay.classList.add('fading');
                setTimeout(resolve, FADE_MS);
            });
        }

        // Returns a promise that resolves once the screen has faded BACK to clear
        function fadeToClear() {
            return new Promise(resolve => {
                fadeOverlay.classList.remove('fading');
                setTimeout(resolve, FADE_MS);
            });
        }

        // Waits for a given <img> element to be fully loaded (handles cached images too)
        function waitForImage(imgEl) {
            return new Promise(resolve => {
                if (imgEl.complete && imgEl.naturalWidth > 0) {
                    resolve();          // Already cached and decoded
                } else {
                    imgEl.addEventListener('load',  resolve, { once: true });
                    imgEl.addEventListener('error', resolve, { once: true }); // Fail gracefully
                }
            });
        }

        /* ── Transition: AR → 360 ── */
        async function enterPanorama() {
            confirmOverlay.style.display = 'none';

            await fadeToBlack();

            // Show panorama container while screen is black
            arScene.style.display        = 'none';
            panoramaContainer.style.display = 'block';
            window.dispatchEvent(new Event('resize'));

            // Wait until the panorama image has actually decoded
            await waitForImage(panoramaImg);

            // Small extra buffer for A-Frame to finish its first render tick
            await new Promise(r => setTimeout(r, 150));

            await fadeToClear();
        }

        /* ── Transition: 360 → AR ── */
        async function exitPanoramaView() {
            await fadeToBlack();

            // Swap views while screen is black
            panoramaContainer.style.display = 'none';
            arScene.style.display           = 'block';
            window.dispatchEvent(new Event('resize'));

            // MindAR needs a moment to re-initialise its canvas and camera feed.
            // 800 ms is a safe minimum; increase if you notice AR not ready on slower devices.
            await new Promise(r => setTimeout(r, 800));

            await fadeToClear();

            hasTriggered = false;   // Ready to re-trigger
        }

        /* ── 1. Start button ── */
        startButton.addEventListener('click', () => {
            overlay.style.display = 'none';
            setTimeout(() => window.dispatchEvent(new Event('resize')), 100);
        });

        /* ── 2. Sub-target events ── */
        subTarget.addEventListener('targetFound', () => {
            if (hasTriggered) return;
            hasTriggered = true;
            confirmOverlay.style.display = 'flex';
        });

        subTarget.addEventListener('targetLost', () => {
            hasTriggered = false;
        });

        /* ── 3. Modal buttons ── */
        btn360.addEventListener('click', () => {
            enterPanorama();
        });

        btnWebsite.addEventListener('click', () => {
            confirmOverlay.style.display = 'none';
            window.open(websiteURL, '_blank');
            setTimeout(() => { hasTriggered = false; }, 3000);
        });

        btnNone.addEventListener('click', () => {
            confirmOverlay.style.display = 'none';
            setTimeout(() => { hasTriggered = false; }, 4000);
        });

        /* ── 4. Exit panorama ── */
        exitPanoramaBtn.addEventListener('click', () => {
            exitPanoramaView();
        });
    </script>

</body>
</html>
