<!DOCTYPE html>
<html>
<head>
    <title>AR Wall Prototype: Video Flow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        #overlay, #confirmOverlay { 
            position: fixed; 
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-family: sans-serif;
        }

        #confirmOverlay {
            display: none;
            z-index: 10000;
        }

        .modal-box {
            background: #333;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #FFD700;
            text-align: center;
        }

        button { 
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            background: #FFD700;
            margin: 10px;
        }

        #noBtn {
            background: #555;
            color: white;
        }

        html, body { margin: 0; height: 100%; overflow: hidden; }
    </style>
</head>

<body>

<div id="overlay">
    <button id="startButton">Start AR Experience</button>
    <div>Point at the poster and move closer to trigger activity.</div>
</div>

<div id="confirmOverlay">
    <div class="modal-box">
        <h2>Keystone Lake: Bull Creek Boat Ramp</h2>
        <p>Would you like to go to the page?</p>
        <button id="yesBtn">Open Page</button>
        <button id="noBtn">Not Now</button>
    </div>
</div>

<a-scene
    mindar-image="imageTargetSrc: target_with_sub.mind; filterMinCF: 0.0001; filterBeta: 0.001;"
    vr-mode-ui="enabled: false;"
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: false; logarithmicDepthBuffer: true;">

    <a-assets>
        <img id="markerImage" src="assets/marker.png">

        <!-- VIDEO ASSET -->
        <video 
            id="brushVideo"
            src="assets/Brush Creek Park.mp4"
            preload="auto"
            crossorigin="anonymous"
            muted
            playsinline
            webkit-playsinline>
        </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- MAIN TARGET -->
    <a-entity mindar-image-target="targetIndex: 0">
        <a-image 
            src="#markerImage"
            position="0.3 0.2 0.03"
            width="0.15" height="0.15"
            animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; dur: 1000; loop: true">
        </a-image>
    </a-entity>

    <!-- SUB TARGET -->
    <a-entity id="subTarget" mindar-image-target="targetIndex: 1">

        <!-- VIDEO IN AR -->
        <a-video 
            id="videoPlane"
            src="#brushVideo"
            width="1"
            height="0.6"
            position="0 0 0.1"
            visible="false">
        </a-video>

    </a-entity>

</a-scene>

<script>
let hasTriggered = false;

const websiteURL = "https://www.recreation.gov/activitypass/AP22376";

const startButton = document.querySelector('#startButton');
const overlay = document.querySelector('#overlay');
const confirmOverlay = document.querySelector('#confirmOverlay');
const yesBtn = document.querySelector('#yesBtn');
const noBtn = document.querySelector('#noBtn');

const subTarget = document.querySelector('#subTarget');
const videoEl = document.querySelector('#brushVideo');
const videoPlane = document.querySelector('#videoPlane');

/* START BUTTON */
startButton.addEventListener('click', () => {
    overlay.style.display = 'none';
    setTimeout(() => window.dispatchEvent(new Event('resize')), 100);
});

/* SUB TARGET FOUND */
subTarget.addEventListener('targetFound', () => {
    if (hasTriggered) return;

    hasTriggered = true;

    console.log("Playing AR video");

    videoPlane.setAttribute('visible', true);

    videoEl.currentTime = 0;
    videoEl.play();
});

/* VIDEO FINISHED */
videoEl.addEventListener('ended', () => {
    console.log("Video ended");

    videoPlane.setAttribute('visible', false);

    confirmOverlay.style.display = 'flex';
});

/* RESET WHEN LOST */
subTarget.addEventListener('targetLost', () => {
    videoEl.pause();
});

/* BUTTONS */
yesBtn.addEventListener('click', () => {
    confirmOverlay.style.display = 'none';
    window.open(websiteURL, '_blank');
    setTimeout(() => { hasTriggered = false; }, 3000);
});

noBtn.addEventListener('click', () => {
    confirmOverlay.style.display = 'none';
    setTimeout(() => { hasTriggered = false; }, 5000);
});
</script>

</body>
</html>
