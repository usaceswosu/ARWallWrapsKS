<!DOCTYPE html>
<html>
<head>
    <title>AR Wall Prototype: Multi Sub-Target</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* ── Start overlay ── */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }

        #instructions {
            margin-top: 20px;
            text-align: center;
            max-width: 80%;
            line-height: 1.4;
        }

        /* ── Confirm overlays (shared style) ── */
        .confirmOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: #222;
            padding: 30px 24px;
            border-radius: 16px;
            border: 2px solid #FFD700;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            max-width: 320px;
            width: 90%;
            color: white;
        }

        .modal-box h2 {
            margin: 0 0 8px;
            font-size: 1.2rem;
            color: #FFD700;
        }

        .modal-box p {
            font-size: 0.95rem;
            color: #ccc;
            margin: 0 0 20px;
        }

        .btn-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 13px 20px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: opacity 0.15s;
        }
        .btn:active { opacity: 0.75; }

        .btn-gold   { background: #FFD700; color: #222; }
        .btn-blue   { background: #3a8fd4; color: white; }
        .btn-green  { background: #3aad6e; color: white; }
        .btn-muted  { background: #555;    color: #ccc; }

        /* ── 360 panorama container ── */
        #panoramaContainer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 8000;
        }

        #panoramaScene {
            width: 100%;
            height: 100%;
        }

        #exitPanorama {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 8500;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: rgba(0,0,0,0.65);
            color: #FFD700;
            border: 2px solid #FFD700;
            backdrop-filter: blur(4px);
        }

        /* ── Video overlay (shared) ── */
        #videoContainer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 8000;
            background: #000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #locationVideo {
            width: 100%;
            max-height: 80vh;
            object-fit: contain;
            background: #000;
        }

        #exitVideo {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 8500;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #FFD700;
            border-radius: 8px;
            background: rgba(0,0,0,0.65);
            color: #FFD700;
            backdrop-filter: blur(4px);
        }

        button#startButton {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #FFD700;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- ── Start screen ── -->
    <div id="overlay">
        <button id="startButton">Start AR Experience</button>
        <div id="instructions">
            Point at the poster.<br>
            Walk closer to markers to trigger activities.
        </div>
    </div>


    <!-- ══════════════════════════════════════════
         MODAL 1 — Brush Creek (bottom-right)
    ══════════════════════════════════════════ -->
    <div id="confirmOverlay1" class="confirmOverlay">
        <div class="modal-box">
            <h2>Brush Creek</h2>
            <p>What would you like to do?</p>
            <div class="btn-row">
                <button class="btn btn-gold"  id="btn360-1">🔭 View 360° Campground</button>
                <button class="btn btn-green" id="btnVideo-1">▶ Watch Location Video</button>
                <button class="btn btn-blue"  id="btnWebsite-1">🌐 Open Web Page</button>
                <button class="btn btn-muted" id="btnNone-1">✕ Stay Here</button>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════
         MODAL 2 — Appalachia Bay (just off center left)
    ══════════════════════════════════════════ -->
    <div id="confirmOverlay2" class="confirmOverlay">
        <div class="modal-box">
            <h2>Keystone Lake: Appalachia Bay</h2>
            <p>What would you like to do?</p>
            <div class="btn-row">
                <button class="btn btn-gold"  id="btn360-2">🔭 View 360° Campground</button>
                <button class="btn btn-green" id="btnVideo-2">▶ Watch Location Video</button>
                <button class="btn btn-blue"  id="btnWebsite-2">🌐 Open Web Page</button>
                <button class="btn btn-muted" id="btnNone-2">✕ Stay Here</button>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════
         MODAL 3 — Walnut Creek (top-middle)
         No video for this location
    ══════════════════════════════════════════ -->
    <div id="confirmOverlay3" class="confirmOverlay">
        <div class="modal-box">
            <h2>Keystone Lake: Walnut Creek</h2>
            <p>What would you like to do?</p>
            <div class="btn-row">
                <button class="btn btn-gold"  id="btn360-3">🔭 View 360° Campground</button>
                <button class="btn btn-blue"  id="btnWebsite-3">🌐 Open Web Page</button>
                <button class="btn btn-muted" id="btnNone-3">✕ Stay Here</button>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════
         MODAL 4 — Washington Irving (off center right)
    ══════════════════════════════════════════ -->
    <div id="confirmOverlay4" class="confirmOverlay">
        <div class="modal-box">
            <h2>Washington Irving</h2>
            <p>What would you like to do?</p>
            <div class="btn-row">
                <button class="btn btn-gold"  id="btn360-4">🔭 View 360° Campground</button>
                <button class="btn btn-green" id="btnVideo-4">▶ Watch Location Video</button>
                <button class="btn btn-blue"  id="btnWebsite-4">🌐 Open Web Page</button>
                <button class="btn btn-muted" id="btnNone-4">✕ Stay Here</button>
            </div>
        </div>
    </div>


    <!-- ── 360° panorama view (shared) ── -->
    <div id="panoramaContainer">
        <a-scene id="panoramaScene"
            embedded
            vr-mode-ui="enabled: false"
            device-orientation-permission-ui="enabled: false"
            renderer="colorManagement: false;">
            <a-assets>
                <img id="panoramaImg" src="assets/panorama.jpg" crossorigin="anonymous">
            </a-assets>
            <a-sky src="#panoramaImg" rotation="0 -90 0"></a-sky>
            <a-camera look-controls="enabled: true; touchEnabled: true;" wasd-controls="enabled: false"
                      position="0 0 0">
            </a-camera>
        </a-scene>
        <button id="exitPanorama">← Back to AR</button>
    </div>

    <!-- ── Video overlay (shared — src is set dynamically per location) ── -->
    <div id="videoContainer">
        <button id="exitVideo">← Back to AR</button>
        <video id="locationVideo"
            controls
            playsinline
            preload="none">
        </video>
    </div>


    <!-- ── Main AR scene ── -->
    <!--
        imageTargetSrc must contain ALL targets in order:
          targetIndex 0 — main poster
          targetIndex 1 — Brush Creek sub-target        (bottom-right)
          targetIndex 2 — Appalachia Bay sub-target     (just off center left)
          targetIndex 3 — Walnut Creek sub-target       (top-middle)
          targetIndex 4 — Washington Irving sub-target  (off center right)
    -->
    <a-scene id="arScene"
        mindar-image="imageTargetSrc: map_targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; warmupTolerance: 5; missTolerance: 5;"
        vr-mode-ui="enabled: false;"
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: false; logarithmicDepthBuffer: true;">

        <a-assets>
            <img id="markerImage" src="assets/marker.png" crossorigin="anonymous">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Main poster overlay — four marker dots -->
        <a-entity mindar-image-target="targetIndex: 0">

            <!-- Bottom-right marker (Brush Creek) -->
            <a-image
                src="#markerImage"
                position="0.3 -0.2 0.03"
                width="0.15" height="0.15"
                material="shader: flat;"
                animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; dur: 1000; loop: true">
            </a-image>

            <!-- Just off center left marker (Appalachia Bay) -->
            <a-image
                src="#markerImage"
                position="-0.15 0.05 0.03"
                width="0.15" height="0.15"
                material="shader: flat;"
                animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; dur: 1000; loop: true">
            </a-image>

            <!-- Top-middle marker (Walnut Creek) -->
            <a-image
                src="#markerImage"
                position="0.0 0.3 0.03"
                width="0.15" height="0.15"
                material="shader: flat;"
                animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; dur: 1000; loop: true">
            </a-image>

            <!-- Off center right marker (Washington Irving) -->
            <a-image
                src="#markerImage"
                position="0.2 0.05 0.03"
                width="0.15" height="0.15"
                material="shader: flat;"
                animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; dur: 1000; loop: true">
            </a-image>

        </a-entity>

        <!-- Sub-target 1: Brush Creek (bottom-right) -->
        <a-entity id="subTarget1" mindar-image-target="targetIndex: 1"></a-entity>

        <!-- Sub-target 2: Appalachia Bay (just off center left) -->
        <a-entity id="subTarget2" mindar-image-target="targetIndex: 2"></a-entity>

        <!-- Sub-target 3: Walnut Creek (top-middle) -->
        <a-entity id="subTarget3" mindar-image-target="targetIndex: 3"></a-entity>

        <!-- Sub-target 4: Washington Irving (off center right) -->
        <a-entity id="subTarget4" mindar-image-target="targetIndex: 4"></a-entity>

    </a-scene>


    <script>
        /* ════════════════════════════════════════
           URL CONFIG — swap these out when ready
        ════════════════════════════════════════ */
        const URLS = {
            brushCreek:        "https://www.recreation.gov/camping/campgrounds/10040524",
            appalachiaBay:     "https://www.recreation.gov/camping/campgrounds/10309470",
            walnutCreek:       "https://www.recreation.gov/camping/campgrounds/10041510?tab=campsites",
            washingtonIrving:  "https://www.recreation.gov/camping/campgrounds/233667"
        };

        /* ════════════════════════════════════════
           360° panorama paths
        ════════════════════════════════════════ */
        const PANORAMAS = {
            brushCreek:        "assets/panorama_brush_creek.jpg",
            appalachiaBay:     "assets/panorama_appalachia.jpg",
            walnutCreek:       "assets/panorama_walnut.jpg",
            washingtonIrving:  "assets/panorama_washington_irving.jpg"
        };

        /* ════════════════════════════════════════
           Video paths (null = no video for that location)
        ════════════════════════════════════════ */
        const VIDEOS = {
            brushCreek:        "assets/Brush Creek Park.mp4",
            appalachiaBay:     "assets/Appalacia Bay Park.mp4",
            walnutCreek:       null,
            washingtonIrving:  "assets/Washington Irving Park.mp4"
        };

        /* ── Element refs ── */
        const overlay           = document.querySelector('#overlay');
        const startButton       = document.querySelector('#startButton');
        const panoramaContainer = document.querySelector('#panoramaContainer');
        const panoramaImg       = document.querySelector('#panoramaImg');
        const exitPanoramaBtn   = document.querySelector('#exitPanorama');
        const videoContainer    = document.querySelector('#videoContainer');
        const locationVideo     = document.querySelector('#locationVideo');
        const exitVideoBtn      = document.querySelector('#exitVideo');
        const arScene           = document.querySelector('#arScene');

        const subTargets = [
            {
                entity:   document.querySelector('#subTarget1'),
                overlay:  document.querySelector('#confirmOverlay1'),
                panorama: PANORAMAS.brushCreek,
                website:  URLS.brushCreek,
                video:    VIDEOS.brushCreek
            },
            {
                entity:   document.querySelector('#subTarget2'),
                overlay:  document.querySelector('#confirmOverlay2'),
                panorama: PANORAMAS.appalachiaBay,
                website:  URLS.appalachiaBay,
                video:    VIDEOS.appalachiaBay
            },
            {
                entity:   document.querySelector('#subTarget3'),
                overlay:  document.querySelector('#confirmOverlay3'),
                panorama: PANORAMAS.walnutCreek,
                website:  URLS.walnutCreek,
                video:    VIDEOS.walnutCreek   // null — no video button in this modal
            },
            {
                entity:   document.querySelector('#subTarget4'),
                overlay:  document.querySelector('#confirmOverlay4'),
                panorama: PANORAMAS.washingtonIrving,
                website:  URLS.washingtonIrving,
                video:    VIDEOS.washingtonIrving
            }
        ];

        const triggered = [false, false, false, false];

        /* ── Helpers ── */
        function hideAllModals() {
            subTargets.forEach(t => t.overlay.style.display = 'none');
        }

        function showModal(index) {
            hideAllModals();
            subTargets[index].overlay.style.display = 'flex';
        }

        function enterPanorama(panoramaPath) {
            hideAllModals();
            panoramaImg.src = panoramaPath;
            arScene.style.display = 'none';
            panoramaContainer.style.display = 'block';
            setTimeout(() => window.dispatchEvent(new Event('resize')), 100);
        }

        function exitPanoramaView() {
            panoramaContainer.style.display = 'none';
            arScene.style.display = 'block';
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
                triggered.fill(false);
            }, 200);
        }

        function enterVideo(videoPath) {
            hideAllModals();
            locationVideo.src = videoPath;
            arScene.style.display = 'none';
            videoContainer.style.display = 'flex';
            locationVideo.play();
        }

        function exitVideoView() {
            locationVideo.pause();
            locationVideo.removeAttribute('src');  // release the file
            locationVideo.load();
            videoContainer.style.display = 'none';
            arScene.style.display = 'block';
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
                triggered.fill(false);
            }, 200);
        }

        /* ── Start button ── */
        startButton.addEventListener('click', () => {
            overlay.style.display = 'none';
            setTimeout(() => window.dispatchEvent(new Event('resize')), 100);
        });

        /* ── Wire up each sub-target ── */
        subTargets.forEach((target, i) => {
            const n = i + 1; // button ID suffix (1-based)

            target.entity.addEventListener('targetFound', () => {
                if (triggered[i]) return;
                triggered[i] = true;
                showModal(i);
            });

            target.entity.addEventListener('targetLost', () => {
                triggered[i] = false;
            });

            document.querySelector(`#btn360-${n}`).addEventListener('click', () => {
                enterPanorama(target.panorama);
            });

            document.querySelector(`#btnWebsite-${n}`).addEventListener('click', () => {
                target.overlay.style.display = 'none';
                window.open(target.website, '_blank');
                setTimeout(() => { triggered[i] = false; }, 3000);
            });

            document.querySelector(`#btnNone-${n}`).addEventListener('click', () => {
                target.overlay.style.display = 'none';
                setTimeout(() => { triggered[i] = false; }, 4000);
            });

            // Wire video button only for locations that have a video
            const videoBtn = document.querySelector(`#btnVideo-${n}`);
            if (videoBtn && target.video) {
                videoBtn.addEventListener('click', () => enterVideo(target.video));
            }
        });

        /* ── Exit buttons ── */
        exitPanoramaBtn.addEventListener('click', () => exitPanoramaView());
        exitVideoBtn.addEventListener('click',    () => exitVideoView());
    </script>

</body>
</html>
